{% extends "base.html" %}

{% block content %}
<div class="container mt-3">
    <h1>Alterar Senha do Usuário</h1>

    <p>
        <strong>Usuário:</strong> {{ usuario[1] }} <br>
        <strong>Email:</strong> {{ usuario[2] }}
    </p>

    <form method="POST">
        <div class="form-group">
            <label for="nova_senha">Nova senha</label>
            <input 
                type="password" 
                id="nova_senha" 
                name="nova_senha" 
                class="form-control" 
                required
            >
        </div>

        <div class="form-group">
            <label for="confirmar_senha">Confirmar nova senha</label>
            <input 
                type="password" 
                id="confirmar_senha" 
                name="confirmar_senha" 
                class="form-control" 
                required
            >
        </div>

        <button type="submit" class="btn btn-primary">
            Salvar nova senha
        </button>

        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-secondary">
            Cancelar
        </a>
    </form>
</div>
{% endblock %}
